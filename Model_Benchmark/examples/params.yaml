ternary_classification_parameters:
  label_col: "label_ter"
  objective: "multi:softmax"
  num_class: 3
  eval_metric: "mlogloss"
  average: "macro"
  seed_size: 51
  transformation: "min_max" # 'std' and 'min_max'

